# nginx-minipc.conf — Static file server on the Fedora MiniPC
# Serves the DesiMapper web app to the Azure VM (via Tailscale).
# Only listens on the Tailscale interface — not exposed to the public internet.

server {
    listen 80;
    listen [::]:80;
    server_name _;    # Accepts any hostname — only reachable via Tailscale

    root /var/www/desimapper;
    index index.html;

    # Gzip for text assets
    gzip on;
    gzip_types text/html application/javascript application/json text/css;
    gzip_comp_level 6;
    gzip_vary on;

    # Immutable cache for hashed JS/CSS bundles (Vite adds content hashes)
    location ~* \.(js|css|woff2|png|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Galaxy binary — large file, stream efficiently, 7-day cache
    location /data/galaxies.bin {
        expires 7d;
        add_header Cache-Control "public";
        add_header Accept-Ranges bytes;
        # Allow large file transfer without buffering limits
        proxy_buffering off;
    }

    # Metadata JSON — short cache so updates propagate
    location /data/metadata.json {
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA fallback — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
}
