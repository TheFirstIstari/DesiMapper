# nginx-azure.conf — Public-facing reverse proxy on the Azure VM
#
# Network flow:
#   Browser → Azure VM (public IP :80/:443) → Tailscale → Fedora MiniPC (100.82.166.71:80)
#
# The Azure VM is the only machine with a public IP. It proxies all traffic
# to the Fedora MiniPC over Tailscale (private mesh network).
#
# Installation on Azure VM:
#   scp scripts/nginx-azure.conf root@<AZURE_IP>:/etc/nginx/conf.d/desimapper.conf
#   ssh root@<AZURE_IP> "nginx -t && systemctl reload nginx"
#
# To enable HTTPS (recommended):
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d yourdomain.com

server {
    listen 80;
    listen [::]:80;
    server_name _;    # Replace with your domain if you have one

    # Proxy to Fedora MiniPC via Tailscale
    location / {
        proxy_pass http://100.82.166.71:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large buffer for binary data (galaxy file is ~8-32 MB)
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # Long timeout for large file transfers
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Don't buffer large binary responses — stream directly to client
        proxy_buffering off;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

# Optional: redirect www → apex
# server {
#     listen 80;
#     server_name www.yourdomain.com;
#     return 301 http://yourdomain.com$request_uri;
# }
